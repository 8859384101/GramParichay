<!-- AI Bot CSS - <head> mein add karo -->
<style id="gram-sevak-styles">
#gram-sevak-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; font-family: 'Poppins', sans-serif; }
#gram-sevak-bubble { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #4a7c3f, #2d5a27); border: 3px solid #2d5a27; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(74,124,63,0.4); transition: transform 0.2s; }
#gram-sevak-bubble:hover { transform: scale(1.08); }
#gram-sevak-bubble .notification-dot { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; background: #e24b4a; border-radius: 50%; border: 2px solid #fff; }
#gram-sevak-window { display: none; width: 360px; height: 520px; background: #fff; border: 1px solid #e0e0e0; border-radius: 16px; flex-direction: column; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
#gram-sevak-window.open { display: flex; }
#gsw-header { background: linear-gradient(135deg, #4a7c3f, #2d5a27); padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
#gsw-avatar { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
#gsw-name { color: #fff; font-size: 14px; font-weight: 600; margin: 0; }
#gsw-status { color: #b8e0b0; font-size: 11px; margin: 0; }
#gsw-close { color: #fff; cursor: pointer; font-size: 20px; margin-left: auto; opacity: 0.8; transition: opacity 0.2s; }
#gsw-close:hover { opacity: 1; }
#gsw-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; background: #f9f9f7; }
.gsw-msg-bot { display: flex; gap: 8px; align-items: flex-start; }
.gsw-msg-bot-avatar { width: 30px; height: 30px; border-radius: 50%; background: #4a7c3f; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; font-size: 15px; }
.gsw-msg-bot-text { background: #fff; border-radius: 4px 12px 12px 12px; padding: 10px 14px; font-size: 13px; color: #333; max-width: 260px; line-height: 1.6; border: 1px solid #e8e8e8; }
.gsw-msg-user { display: flex; justify-content: flex-end; }
.gsw-msg-user-text { background: #4a7c3f; color: #fff; border-radius: 12px 12px 4px 12px; padding: 10px 14px; font-size: 13px; max-width: 240px; line-height: 1.6; }
#gsw-input-area { padding: 12px; border-top: 1px solid #e8e8e8; display: flex; gap: 8px; align-items: center; background: #fff; }
#gsw-input { flex: 1; border: 1.5px solid #e0e0e0; border-radius: 22px; padding: 9px 16px; font-size: 13px; outline: none; font-family: inherit; color: #333; transition: border-color 0.2s; }
#gsw-input:focus { border-color: #4a7c3f; }
#gsw-mic-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #e0e0e0; background: #f5f5f0; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 16px; }
#gsw-mic-btn.listening { background: #fee2e2; border-color: #e24b4a; animation: pulse 1s infinite; }
#gsw-send-btn { width: 36px; height: 36px; border-radius: 50%; background: #4a7c3f; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; font-size: 16px; }
#gsw-send-btn:hover { background: #2d5a27; }
.gsw-typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
.gsw-typing span { width: 7px; height: 7px; border-radius: 50%; background: #4a7c3f; animation: gsw-blink 1.2s infinite; }
.gsw-typing span:nth-child(2) { animation-delay: 0.2s; }
.gsw-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes gsw-blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0.3)} 50%{box-shadow:0 0 0 6px rgba(226,75,74,0)} }
.gsw-quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.gsw-qbtn { font-size: 12px; padding: 5px 12px; border-radius: 14px; border: 1.5px solid #4a7c3f; color: #4a7c3f; background: transparent; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.gsw-qbtn:hover { background: #4a7c3f; color: #fff; }
.gsw-member-card { background: #f0f8ee; border: 1px solid #b8e0b0; border-radius: 10px; padding: 10px 12px; margin-top: 6px; font-size: 12px; line-height: 1.8; }
.gsw-member-card strong { color: #2d5a27; }
</style>

<!-- AI Bot HTML - </body> se pehle paste karo -->
<div id="gram-sevak-container">

  <!-- Chat Window -->
  <div id="gram-sevak-window">

      </div>
      <span id="gsw-close" onclick="gramSevakToggle()">✕</span>
    </div>

    <div id="gsw-messages">

          <div class="gsw-msg-bot-text">
            Pranam! 🙏 Main Gram Sevak hoon.<br><br>
            Aap mujhse ye sab pooch sakte ho:
            <ul style="margin: 6px 0 0 16px; padding: 0; font-size: 12px;">
              <li>Kisi member ki details</li>

            </ul>

            <button class="gsw-qbtn" onclick="gramSevakSendQuick('Ram Kumar ki details batao')">Member dhundho</button>
            <button class="gsw-qbtn" onclick="gramSevakSendQuick('Pati ka naam Ram Kumar hai, saas sasur kaun hain?')">Saas-Sasur</button>
            <button class="gsw-qbtn" onclick="gramSevakSendQuick('Naya member kaise add karein?')">Member add karo</button>
          </div>
        </div>

    <div id="gsw-input-area">
      <button id="gsw-mic-btn" onclick="gramSevakToggleMic()" title="Voice se bolein">🎤</button>

             onkeydown="if(event.key==='Enter') gramSevakSend()" />

    </div>
  </div>

  <!-- Floating Button -->
  <div id="gram-sevak-bubble" onclick="gramSevakToggle()">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">

<!-- AI Bot JavaScript -->
<script>
var gramSevakOpen = false;
var gramSevakListening = false;
var gramSevakRecognition = null;

function gramSevakToggle() {
  gramSevakOpen = !gramSevakOpen;
  var win = document.getElementById('gram-sevak-window');
  if (gramSevakOpen) {
    win.classList.add('open');
    document.querySelector('#gram-sevak-bubble .notification-dot').style.display = 'none';
  } else {
    win.classList.remove('open');
  }
}

function gramSevakAddMsg(text, isUser) {
  var msgs = document.getElementById('gsw-messages');
  var div = document.createElement('div');
  if (isUser) {
    div.className = 'gsw-msg-user';
    div.innerHTML = '<div class="gsw-msg-user-text">' + text + '</div>';
  } else {
    div.className = 'gsw-msg-bot';
    div.innerHTML = '<div class="gsw-msg-bot-avatar">👨‍🌾</div><div class="gsw-msg-bot-text">' + text + '</div>';
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function gramSevakShowTyping() {
  var msgs = document.getElementById('gsw-messages');
  var div = document.createElement('div');
  div.className = 'gsw-msg-bot';
  div.id = 'gsw-typing';
  div.innerHTML = '<div class="gsw-msg-bot-avatar">👨‍🌾</div><div class="gsw-msg-bot-text"><div class="gsw-typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function gramSevakRemoveTyping() {
  var t = document.getElementById('gsw-typing');
  if (t) t.remove();
}

async function gramSevakSend() {
  var input = document.getElementById('gsw-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  gramSevakAddMsg(text, true);
  gramSevakShowTyping();

  // Database se members fetch karne ki koshish
  var membersContext = '';
  try {
    var res = await fetch('/api/members?limit=50');
    var data = await res.json();
    if (data && data.length) {
      membersContext = 'Database mein available members: ' + 
        data.slice(0, 20).map(function(m) {
          return m.full_name + ' (ID:' + m.id + ', Pita:' + (m.father_name||'') + ', Mata:' + (m.mother_name||'') + ', Mobile:' + (m.mobile||'') + ', Bakhali:' + (m.Bakhali||m.bakhali||'') + ')';
        }).join(' | ');
    }
  } catch(e) {
    membersContext = 'Database se data nahi mila. Demo mode mein hoon.';
  }

  try {
    var apiRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Tu GramParichay ka AI assistant "Gram Sevak" hai. Tu ek samajhdar gaon ke bujurg ki tarah baat karta hai.

DATABASE INFO:
- Members table mein columns hain: id, full_name, father_name, mother_name, spouse_name, mobile, email, gender, date_of_birth, age, marital_status, blood_group, education, occupation, Bakhali, village, tehsil, district, state, house_no, aadhar_no, voter_id, notes
- Relations table mein: member_id, related_member_id, relation_type (father/mother/son/daughter/wife/husband/brother/sister etc.)
- "Bakhali" column mohalla ki jagah use hota hai

CURRENT DATABASE DATA:
${membersContext}

TU KYA KAR SAKTA HAI:
1. Kisi member ki details batana - upar diye data mein search kar
2. Pati ke naam se Saas-Sasur batana - pati ke father/mother dhundh
3. Voice se add karne mein guidance dena
4. Family relations explain karna

IMPORTANT RULES:
- Hamesha Hindi mein jawab de
- Chhota aur seedha jawab de (3-4 lines max)
- Agar member mila to uski details de
- Agar Saas-Sasur pooche to pati ke father_name aur mother_name batao
- "Pranam" ya "Haan bhai" se shuru kar
- Agar data nahi mila to bolo "Ye naam database mein nahi mila, admin se check karwao"`,
        messages: [{ role: 'user', content: text }]
      })
    });
    var apiData = await apiRes.json();
    gramSevakRemoveTyping();
    var reply = apiData.content && apiData.content[0] ? apiData.content[0].text : 'Maafi chahta hoon, kuch problem ho gayi.';
    gramSevakAddMsg(reply, false);
  } catch(e) {
    gramSevakRemoveTyping();
    gramSevakAddMsg('Maafi chahta hoon, abhi server se baat nahi ho pa rahi. Thodi der baad try karein.', false);
  }
}

function gramSevakSendQuick(text) {
  document.getElementById('gsw-input').value = text;
  gramSevakSend();
}

function gramSevakToggleMic() {
  var btn = document.getElementById('gsw-mic-btn');
  var input = document.getElementById('gsw-input');

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    gramSevakAddMsg('Bhai, aapka browser voice support nahi karta. Chrome browser use karein.', false);
    return;
  }

  if (gramSevakListening) {
    gramSevakRecognition && gramSevakRecognition.stop();
    gramSevakListening = false;
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    return;
  }

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  gramSevakRecognition = new SR();
  gramSevakRecognition.lang = 'hi-IN';
  gramSevakRecognition.continuous = false;
  gramSevakRecognition.interimResults = false;

  gramSevakRecognition.onstart = function() {
    gramSevakListening = true;
    btn.classList.add('listening');
    btn.textContent = '🔴';
    gramSevakAddMsg('Sun raha hoon... boliye', false);
  };

  gramSevakRecognition.onend = function() {
    gramSevakListening = false;
    btn.classList.remove('listening');
    btn.textContent = '🎤';
  };

  gramSevakRecognition.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    input.value = transcript;
    gramSevakSend();
  };

  gramSevakRecognition.onerror = function(e) {
    gramSevakListening = false;
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    gramSevakAddMsg('Awaaz sahi se nahi aayi, phir se try karein.', false);
  };

  gramSevakRecognition.start();
}
</script>
